<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Karla 💐</title>

<style>
body {
    margin: 0;
    background: linear-gradient(to top, #fef3c7, #fde68a);
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
}

/* CONTENEDOR */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* CAJA BONITA */
.caja {
    width: 140px;
    height: 140px;
    background: #fbbf24;
    border-radius: 15px;
    position: relative;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: transform 0.3s;
}

.caja:hover {
    transform: scale(1.05);
}

/* LAZO */
.lazo {
    position: absolute;
    width: 100%;
    height: 20px;
    background: #fff;
    top: 50%;
    transform: translateY(-50%);
}

.lazo::before {
    content: "";
    position: absolute;
    width: 20px;
    height: 100%;
    background: #fff;
    left: 50%;
    transform: translateX(-50%);
}

/* RAMO */
.ramo {
    display: none;
    width: 260px;
    margin-top: 20px;
}

/* MENSAJE */
.mensaje {
    display: none;
    margin-top: 20px;
    font-size: 20px;
    color: #78350f;
}
</style>
</head>

<body>

<div class="container">

<h2>🎁 Para Karla 💛</h2>
<p>Haz clic…</p>

<div class="caja" onclick="abrir()">
    <div class="lazo"></div>
</div>

<img src="ramo.png" class="ramo" id="ramo">

<div class="mensaje" id="mensaje">
💐 Para ti, Karla…<br>
No sabía cómo darte flores,<br>
pero quería darte algo especial 💛
</div>

</div>

<iframe id="musica" width="0" height="0"
src="https://www.youtube.com/embed/nONFnjR5VFI?enablejsapi=1"
frameborder="0" allow="autoplay"></iframe>

<script>
function abrir() {
    document.querySelector(".caja").style.display = "none";

    document.getElementById("ramo").style.display = "block";
    document.getElementById("mensaje").style.display = "block";

    // Música
    const iframe = document.getElementById("musica");
    iframe.src += "&autoplay=1&loop=1&playlist=nONFnjR5VFI";
}
</script>

</body>
</html>
